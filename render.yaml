services:
  - type: web
    name: prompt-db
    runtime: python
    plan: free
    buildCommand: "./build.sh"
    startCommand: "gunicorn promptdb.wsgi:application"
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.2
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "prompt-db.onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: prompt-db-postgres
          property: connectionString

databases:
  - name: prompt-db-postgres
    plan: free
