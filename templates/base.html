<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Prompt DB{% endblock %}</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 960px; margin: 2rem auto; padding: 0 1rem; line-height: 1.5; }
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
        a.button, button { background: #0d6efd; color: white; border: none; padding: .5rem .9rem; border-radius: 6px; text-decoration: none; cursor: pointer; }
        .card { border: 1px solid #ddd; border-radius: 8px; padding: 1rem; margin-bottom: .9rem; }
        input, select, textarea { width: 100%; padding: .45rem; margin-top: .25rem; margin-bottom: .8rem; }
        label { font-weight: bold; }
        .meta { color: #666; font-size: .9rem; }
    </style>
</head>
<body>
    <header>
        <h1><a href="/" style="text-decoration: none; color: inherit;">Prompt DB</a></h1>
        <a class="button" href="{% url 'prompt-create' %}">新規プロンプト</a>
    </header>
    {% block content %}{% endblock %}
</body>
</html>
